// ── Data structures for rendered groups ──
let currentRenderedGroups = [];

// ── Config ──
function toggleConfig() {
  const panel = $('#configPanel');
  const btn = $('#settingsBtn');
  panel.classList.toggle('show');
  btn.classList.toggle('active');
}

async function applyPath() {
  const input = $('#claudePathInput');
  const status = $('#configStatus');
  const path = input.value.trim();
  if (!path) { status.textContent = '请输入路径'; status.className = 'config-status err'; return; }

  status.textContent = '验证中...';
  status.className = 'config-status';

  const res = await fetch('/api/set-path', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path }),
  }).then(r => r.json());

  if (res.ok) {
    status.textContent = '已设置: ' + res.claude_dir;
    status.className = 'config-status ok';
    // Reload projects
    loadProjects();
  } else {
    status.textContent = res.error;
    status.className = 'config-status err';
  }
}

// ── Pinned conversations ──
async function loadPins() {
  try {
    const pins = await fetch('/api/pins').then(r => r.json());
    allPins = Array.isArray(pins) ? pins : [];
  } catch (e) {
    allPins = [];
  }
  const totalChapters = allPins.reduce((acc, p) => acc + (p.chapters?.length || 0), 0);
  const countEl = $('#pinnedCount');
  if (totalChapters > 0) {
    countEl.textContent = String(totalChapters);
    countEl.style.display = '';
  } else {
    countEl.style.display = 'none';
  }
  // Refresh sidebar badges (any session already rendered)
  for (const p of allPins) {
    if (p.sessionPath) pinnedSessionPaths.add(p.sessionPath);
    const items = $$(`.session-item[data-path="${cssEscape(p.sessionPath)}"]`);
    items.forEach(el => {
      el.classList.add('has-pin');
      el.dataset.pinCount = String(p.chapters?.length || 0);
    });
  }
}

function cssEscape(s) {
  // Lightweight CSS attribute-selector escaping for paths (which may contain ", \, special chars)
  if (window.CSS && CSS.escape) return CSS.escape(s);
  return String(s).replace(/(["\\])/g, '\\$1');
}

function togglePinnedView() {
  const view = $('#pinnedView');
  if (view.classList.contains('show')) {
    hidePinnedView();
  } else {
    showPinnedView();
  }
}

function showPinnedView() {
  $('#chatContainer').style.display = 'none';
  $('#mainHeader').style.display = 'none';
  $('#exportToolbar').classList.remove('show');
  $('#findBar').classList.remove('show');
  $('#pinnedBtn').classList.add('active');
  const view = $('#pinnedView');
  view.classList.add('show');
  renderPinnedView();
}

function hidePinnedView() {
  $('#pinnedView').classList.remove('show');
  $('#chatContainer').style.display = '';
  $('#pinnedBtn').classList.remove('active');
  // Show main header again if a session is loaded
  if (currentMessages.length > 0) {
    $('#mainHeader').style.display = 'flex';
  }
}

function renderPinnedView() {
  const total = allPins.reduce((acc, p) => acc + (p.chapters?.length || 0), 0);
  $('#pinnedSubtitle').textContent = total
    ? `${total} 条 pin · ${allPins.length} 个会话`
    : '';
  const body = $('#pinnedListBody');
  body.innerHTML = '';
  if (allPins.length === 0) {
    body.innerHTML = `
      <div class="pv-empty">
        <div class="icon">🔔</div>
        <div>暂无 pin 过的对话</div>
        <div style="font-size:12px;margin-top:8px">
          在 Claude desktop 里点击消息上的铃铛图标即可 pin 一条回复，<br>
          刷新本页就能在这里看到。
        </div>
      </div>`;
    return;
  }
  for (const p of allPins) {
    const card = document.createElement('div');
    card.className = 'pv-session-card';
    const hasSession = !!p.sessionPath;
    const titleText = p.sessionTitle || p.firstMessage || (hasSession ? '(未命名会话)' : '(会话尚未同步到磁盘)');
    const titleClass = (p.sessionTitle || p.firstMessage) ? '' : 'unset';
    const projectText = p.projectPath || (p.cliSessionId ? p.cliSessionId.substring(0, 8) : p.localId);
    let inner = `
      <div class="pv-session-head">
        <span class="pv-session-title ${titleClass}" title="${escapeAttr(titleText)}">${escapeHtml(titleText)}</span>
        ${hasSession ? `<button class="pv-open-session-btn" data-path="${escapeAttr(p.sessionPath)}">打开会话</button>` : ''}
      </div>
      <div class="pv-session-project" title="${escapeAttr(projectText)}">📁 ${escapeHtml(projectText)}</div>
    `;
    for (const c of (p.chapters || [])) {
      const jumpDisabled = !c.msgUuid || !hasSession;
      inner += `
        <div class="pv-chapter">
          <span class="pv-chapter-icon">🔔</span>
          <span class="pv-chapter-title" title="${escapeAttr(c.title || '(无标题)')}">${escapeHtml(c.title || '(无标题)')}</span>
          <button class="pv-jump-btn" data-path="${escapeAttr(p.sessionPath)}" data-uuid="${escapeAttr(c.msgUuid || '')}" ${jumpDisabled ? 'disabled' : ''} title="${jumpDisabled ? '该消息无法定位（会话未同步或锚点丢失）' : '跳转到该消息'}">跳转</button>
          <button class="pv-export-btn" data-path="${escapeAttr(p.sessionPath)}" data-uuid="${escapeAttr(c.msgUuid || '')}" ${hasSession ? '' : 'disabled'} title="${hasSession ? '在导出模式中打开并预选这条 pin' : '会话尚未同步到磁盘，无法导出'}">导出</button>
        </div>
      `;
    }
    card.innerHTML = inner;
    card.querySelectorAll('.pv-open-session-btn').forEach(btn => {
      btn.addEventListener('click', () => jumpToSession(btn.dataset.path, ''));
    });
    card.querySelectorAll('.pv-jump-btn').forEach(btn => {
      if (btn.disabled) return;
      btn.addEventListener('click', () => jumpToSession(btn.dataset.path, btn.dataset.uuid));
    });
    card.querySelectorAll('.pv-export-btn').forEach(btn => {
      if (btn.disabled) return;
      btn.addEventListener('click', () => exportPin(btn.dataset.path, btn.dataset.uuid));
    });
    body.appendChild(card);
  }
}

async function jumpToSession(sessionPath, msgUuid) {
  if (!sessionPath) return;
  hidePinnedView();
  // Ensure the project that owns this session is expanded so its session list exists.
  // Simplest path: fabricate a minimal session object the loader needs.
  pendingJumpUuid = msgUuid || null;
  // Try to locate the existing list item so the sidebar selection stays in sync
  const existing = document.querySelector(`.session-item[data-path="${cssEscape(sessionPath)}"]`);
  if (existing) {
    // Trigger via click so any expand-parent side effects run
    existing.click();
    return;
  }
  // Otherwise call loadSession directly. We don't know all metadata; loadSession will
  // re-read what it needs from /api/session, but we need basic fields for the header.
  await loadSession({ path: sessionPath, id: '', customTitle: '', firstMessage: '', slug: '' });
}

// Open a pinned session straight into export mode, with the pin pre-selected,
// highlighted and scrolled into view (jump + export are one cohesive flow).
async function exportPin(sessionPath, msgUuid) {
  if (!sessionPath) return;
  hidePinnedView();
  pendingExport = { uuid: msgUuid || null };
  const existing = document.querySelector(`.session-item[data-path="${cssEscape(sessionPath)}"]`);
  if (existing) { existing.click(); return; }
  await loadSession({ path: sessionPath, id: '', customTitle: '', firstMessage: '', slug: '' });
}

// ── Init & data loading ──
async function init() {
  // Restore persisted toggle state
  if (hideUnnamed) document.getElementById('hideUnnamedToggle').classList.add('active');
  if (hideAbandoned) document.getElementById('hideAbandonedToggle').classList.add('active');
  // Check status first
  const status = await fetch('/api/status').then(r => r.json());

  if (status.detected) {
    $('#claudePathInput').value = status.claude_dir;
    if (status.is_custom) {
      $('#configStatus').textContent = '自定义路径: ' + status.claude_dir;
      $('#configStatus').className = 'config-status ok';
    }
    loadProjects();
    loadPins();
  } else {
    // Show config panel and no-config state
    $('#configPanel').classList.add('show');
    $('#settingsBtn').classList.add('active');
    const sidebar = $('#sidebarContent');
    sidebar.innerHTML = `
      <div class="no-config">
        <div class="icon">&#128269;</div>
        <div class="title">未检测到 ~/.claude 目录</div>
        <div class="desc">请在上方输入 Claude 数据目录路径<br>例如: ~/.claude 或 /path/to/.claude</div>
      </div>
    `;
  }
}

async function loadProjects() {
  const projects = await fetch('/api/projects').then(r => r.json());
  const sidebar = $('#sidebarContent');
  sidebar.innerHTML = '';

  if (projects.length === 0) {
    sidebar.innerHTML = '<div class="empty-state" style="padding:40px;font-size:13px">未找到 session</div>';
    return;
  }

  // Group worktree projects under their parent using the project directory name
  // (id) rather than fullPath. The id encodes the original worktree identity
  // reliably, whereas fullPath (from cwd) can drift when a session switches
  // worktrees at runtime.
  const byId = new Map(projects.map(p => [p.id, p]));
  const childrenOf = new Map();
  const worktreeIds = new Set();
  for (const p of projects) {
    const m = p.id.match(/^(.+)--claude-worktrees-(.+)$/);
    if (m && byId.has(m[1])) {
      const parent = byId.get(m[1]);
      if (!childrenOf.has(parent.id)) childrenOf.set(parent.id, []);
      childrenOf.get(parent.id).push({ ...p, worktreeName: m[2] });
      worktreeIds.add(p.id);
    }
  }

  for (const proj of projects) {
    if (worktreeIds.has(proj.id)) continue;
    sidebar.appendChild(buildProjectNode(proj, childrenOf.get(proj.id) || []));
  }
}

function buildProjectNode(proj, worktrees) {
  const item = document.createElement('div');
  item.className = 'project-item';
  const parts = proj.name.split('/').filter(Boolean);
  const lastFolder = parts.pop() || proj.name;
  const parentPath = parts.length > 0 ? parts.join('/') + '/' : '';
  const nameHtml = `<span style="color:var(--text-dim);font-size:11px;font-weight:400">${escapeHtml(parentPath)}</span><span style="font-weight:600">${escapeHtml(lastFolder)}</span>`;
  const wtBadge = worktrees.length ? `<span class="wt-count" title="${worktrees.length} 个 worktree">🌿${worktrees.length}</span>` : '';
  item.innerHTML = `
    <div class="project-header" data-project="${proj.id}">
      <span class="arrow">▶</span>
      <span class="name" title="${proj.name}">${nameHtml}</span>
      ${wtBadge}
      <span class="badge">${proj.sessions}</span>
    </div>
    <div class="session-list" id="sessions-${proj.id}"></div>
  `;
  item.querySelector('.project-header').addEventListener('click', () => toggleProject(proj.id));
  if (worktrees.length) item._worktrees = worktrees;
  return item;
}

function buildWorktreeNode(proj) {
  const item = document.createElement('div');
  item.className = 'project-item worktree-item';
  const shortName = proj.worktreeName.replace(/-[0-9a-f]{6,}$/, '');
  const nameHtml = `<span class="wt-icon">🌿</span><span style="font-weight:600" title="${escapeHtml(proj.worktreeName)}">${escapeHtml(shortName)}</span>`;
  item.innerHTML = `
    <div class="project-header" data-project="${proj.id}">
      <span class="arrow">▶</span>
      <span class="name" title="${proj.name}">${nameHtml}</span>
      <span class="badge">${proj.sessions}</span>
    </div>
    <div class="session-list" id="sessions-${proj.id}"></div>
  `;
  item.querySelector('.project-header').addEventListener('click', () => toggleProject(proj.id));
  return item;
}

async function toggleProject(projectId) {
  const header = $(`.project-header[data-project="${projectId}"]`);
  const list = $(`#sessions-${projectId}`);
  const item = header.closest('.project-item');

  if (header.classList.contains('expanded')) {
    header.classList.remove('expanded');
    list.classList.remove('show');
    return;
  }

  header.classList.add('expanded');
  list.classList.add('show');

  if (list.children.length > 0) return;

  list.innerHTML = '<div class="loading" style="padding:16px;font-size:12px">加载中</div>';
  const sessions = await fetch(`/api/sessions?project=${projectId}`).then(r => r.json());
  allSessions[projectId] = sessions;
  list.innerHTML = '';

  // Group related sessions via union-find: two sessions are in the same family
  // if they share a non-empty forkRoot (sibling forks) OR a non-empty customTitle
  // (inherited /title survives renaming and multi-level forks). This merges
  // sessions that branched from different points but belong to the same
  // conceptual thread.
  const parent = new Map();
  for (const s of sessions) parent.set(s.id, s.id);
  const find = (x) => {
    let r = x;
    while (parent.get(r) !== r) r = parent.get(r);
    while (parent.get(x) !== r) { const n = parent.get(x); parent.set(x, r); x = n; }
    return r;
  };
  const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) parent.set(ra, rb); };
  const idxRoot = new Map(), idxTitle = new Map(), idxFirstMsg = new Map();
  for (const s of sessions) {
    if (s.forkRoot) { if (!idxRoot.has(s.forkRoot)) idxRoot.set(s.forkRoot, []); idxRoot.get(s.forkRoot).push(s.id); }
    if (s.customTitle) { if (!idxTitle.has(s.customTitle)) idxTitle.set(s.customTitle, []); idxTitle.get(s.customTitle).push(s.id); }
    if (s.firstMsgUuid) { if (!idxFirstMsg.has(s.firstMsgUuid)) idxFirstMsg.set(s.firstMsgUuid, []); idxFirstMsg.get(s.firstMsgUuid).push(s.id); }
  }
  for (const ids of idxRoot.values()) for (let i = 1; i < ids.length; i++) union(ids[0], ids[i]);
  for (const ids of idxTitle.values()) for (let i = 1; i < ids.length; i++) union(ids[0], ids[i]);
  for (const ids of idxFirstMsg.values()) for (let i = 1; i < ids.length; i++) union(ids[0], ids[i]);

  const groups = new Map(); // root id -> [sessions]
  for (const s of sessions) {
    const root = find(s.id);
    if (!groups.has(root)) groups.set(root, []);
    groups.get(root).push(s);
  }
  const singletons = [];
  for (const [key, arr] of [...groups.entries()]) {
    if (arr.length < 2) { singletons.push(...arr); groups.delete(key); }
  }

  // Build display order: each group represented by its newest member's mtime,
  // singletons by their own mtime. Sort by that, newest first.
  const entries = [];
  for (const [root, arr] of groups.entries()) {
    // Ancestor: prefer a rootless member, then isForkOrigin (session that
    // contains the forkRoot UUID as its own message), else null.
    const rootless = arr.filter(s => !s.forkRoot);
    const ancestor = rootless[0] || arr.find(s => s.isForkOrigin) || null;
    // Label = ancestor's title (the root session defines the group identity).
    const groupTitle = (ancestor && ancestor.customTitle) || (() => {
      let t = '', best = 0;
      for (const s of arr) if (s.customTitle && (s.lastQueryTs || s.modified) > best) { best = (s.lastQueryTs || s.modified); t = s.customTitle; }
      return t;
    })();
    // Sort non-ancestor members by last query time, newest first.
    const rest = arr.filter(s => s !== ancestor).sort((a, b) => (b.lastQueryTs || b.modified) - (a.lastQueryTs || a.modified));
    const ordered = ancestor ? [ancestor, ...rest] : rest;
    const sortKey = Math.max(...arr.map(s => s.lastQueryTs || s.modified));
    entries.push({ kind: 'group', root, sessions: ordered, ancestor, groupTitle, sortKey });
  }
  for (const s of singletons) entries.push({ kind: 'single', session: s, sortKey: s.lastQueryTs || s.modified });
  // Interleave worktree nodes sorted by latest session time
  const worktrees = item ? (item._worktrees || []) : [];
  for (const w of worktrees) {
    entries.push({ kind: 'worktree', worktree: w, sortKey: w.lastModified || 0 });
  }
  entries.sort((a, b) => b.sortKey - a.sortKey);

  for (const e of entries) {
    if (e.kind === 'worktree') {
      list.appendChild(buildWorktreeNode(e.worktree));
    } else if (e.kind === 'single') {
      list.appendChild(buildSessionItem(e.session, projectId));
    } else {
      const ancestor = e.ancestor;
      const label = e.groupTitle || ancestor.customTitle || ancestor.slug || ancestor.firstMessage || ancestor.id;
      const group = document.createElement('div');
      group.className = 'fork-group';
      group.innerHTML = `
        <div class="fork-group-header">
          <span class="arrow">▶</span>
          <span class="fork-icon">🔀</span>
          <span class="fork-label" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
          <span class="fork-count">${e.sessions.length} 分支</span>
        </div>
        <div class="fork-group-children"></div>
      `;
      const header = group.querySelector('.fork-group-header');
      const children = group.querySelector('.fork-group-children');
      header.addEventListener('click', () => {
        header.classList.toggle('expanded');
        children.classList.toggle('show');
      });
      for (const s of e.sessions) children.appendChild(buildSessionItem(s, projectId, label, s === ancestor));
      list.appendChild(group);
    }
  }
  applyFilters();
}

function buildSessionItem(s, projectId, groupLabel = '', isAncestor = false) {
  const item = document.createElement('div');
  const classes = ['session-item'];
  if (s.sessionType === 'scheduled') classes.push('scheduled');
  if (s.sessionType === 'headless') classes.push('headless');
  if (s.isArchived) classes.push('archived');
  if (isAncestor) classes.push('is-ancestor');
  if (s.pinCount > 0) { classes.push('has-pin'); pinnedSessionPaths.add(s.path); }
  item.className = classes.join(' ');
  item.dataset.pinCount = String(s.pinCount || 0);
  item.dataset.path = s.path;
  item.dataset.project = projectId;
  item.dataset.sessionType = s.sessionType || 'manual';
  item.dataset.archived = s.isArchived ? '1' : '0';
  item.dataset.hasName = (s.customTitle || s.slug) ? '1' : '0';
  item.dataset.lastActivity = String(s.lastQueryTs || s.modified || 0);

  const date = new Date(s.modified * 1000);
  const dateStr = date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  const sizeStr = s.size > 1024*1024 ? (s.size/1024/1024).toFixed(1)+'MB' : (s.size/1024).toFixed(0)+'KB';

  const displayTitle = s.customTitle || s.firstMessage || s.slug || s.id;
  const titleHtml = s.customTitle
    ? `<span style="color:#4ade80;font-weight:600">${escapeHtml(s.customTitle)}</span>`
    : s.firstMessage
      ? escapeHtml(s.firstMessage)
      : s.slug
        ? `<span style="color:#38bdf8">${escapeHtml(s.slug)}</span>`
        : escapeHtml(displayTitle);
  const srcIcon = s.entrypoint === 'cli' ? '⌨' : s.entrypoint === 'claude-desktop' ? '🖥' : '';
  const samePreview = s.lastMessage && s.firstMessage && (s.lastMessage.startsWith(s.firstMessage) || s.firstMessage.startsWith(s.lastMessage));
  const previewText = (s.lastMessage && !samePreview) ? s.lastMessage : '';
  // Inside a fork group, children inherit the same customTitle from the shared
  // ancestor history. Skip the duplicate title row when there's a distinguishing
  // preview, and let the preview be the primary line.
  const hideTitle = groupLabel && !s.customTitle && displayTitle === groupLabel && previewText;
  if (hideTitle) item.classList.add('fork-branch');
  const titleBlock = hideTitle ? '' : `<div class="title" title="${escapeHtml(displayTitle)}">${titleHtml}</div>`;
  const previewHtml = previewText ? `<div class="preview" title="${escapeHtml(previewText)}">${escapeHtml(previewText)}</div>` : '';

  const ancestorTag = isAncestor ? `<span class="ancestor-tag" title="被 fork 的原始会话">🌱 起点</span>` : '';
  const pinTag = s.pinCount > 0 ? `<span class="pin-indicator" title="本会话有 ${s.pinCount} 条 pin">🔔${s.pinCount}</span>` : '';
  const unarchiveBtn = s.isArchived
    ? `<button class="unarchive-btn" title="取消归档（在 Claude desktop 里这条 session 会重新出现在常规列表）">↺ 取消归档</button>`
    : '';
  item.innerHTML = `
    ${titleBlock}
    ${previewHtml}
    <div class="meta">
      <span>${srcIcon ? srcIcon + ' ' : ''}${dateStr}</span>
      <span>${sizeStr}</span>
      <span class="session-id-short" title="点击复制完整 Session ID: ${s.id}" style="opacity:0.6;cursor:pointer">${s.id.substring(0, 8)}</span>
      ${ancestorTag}
      ${pinTag}
      ${unarchiveBtn}
    </div>
  `;
  item.querySelector('.session-id-short').addEventListener('click', (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(s.id);
    const el = e.target;
    const orig = el.textContent;
    el.textContent = '已复制!';
    el.style.color = '#4ade80';
    setTimeout(() => { el.textContent = orig; el.style.color = ''; }, 1000);
  });
  const unBtn = item.querySelector('.unarchive-btn');
  if (unBtn) {
    unBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      unarchiveSession(s.id, unBtn);
    });
  }
  item.addEventListener('click', () => loadSession(s));
  return item;
}

async function unarchiveSession(sessionId, btnEl) {
  if (!sessionId || !btnEl || btnEl.disabled) return;
  btnEl.disabled = true;
  const orig = btnEl.textContent;
  btnEl.textContent = '处理中…';
  try {
    const res = await fetch('/api/set-archived', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, archived: false }),
    }).then(r => r.json());
    if (!res.ok) {
      showToast('取消归档失败: ' + (res.error || ''));
      btnEl.disabled = false;
      btnEl.textContent = orig;
      return;
    }
    showToast(res.noChange ? '该 session 不是归档状态' : '已取消归档');
    // Update every sidebar copy of this session (could appear in fork groups and ID-match cards).
    document.querySelectorAll(`.session-item`).forEach(el => {
      const path = el.dataset.path || '';
      if (!path.endsWith('/' + sessionId + '.jsonl')) return;
      el.classList.remove('archived');
      el.dataset.archived = '0';
      const b = el.querySelector('.unarchive-btn');
      if (b) b.remove();
    });
    applyFilters();
  } catch (e) {
    showToast('请求失败: ' + e.message);
    btnEl.disabled = false;
    btnEl.textContent = orig;
  }
}

async function loadSession(session) {
  // Leaving the pinned view: opening a session is an implicit "exit", so reset
  // the pinned-view overlay and un-highlight the 🔔 button before rendering,
  // otherwise the button stays amber and the chat area stays hidden behind it.
  if ($('#pinnedView').classList.contains('show')) hidePinnedView();
  // Exit export mode when switching sessions
  if (exportMode) toggleExportMode();
  // Close in-page find when switching sessions (highlights belong to prior DOM)
  if ($('#findBar').classList.contains('show')) closeFindBar();
  else { findHits = []; findCurrent = -1; }

  $$('.session-item').forEach(el => el.classList.remove('active'));
  const active = $(`.session-item[data-path="${session.path}"]`);
  if (active) active.classList.add('active');

  const chat = $('#chatContainer');
  chat.innerHTML = '<div class="loading">加载对话</div>';
  $('#mainHeader').style.display = 'flex';

  const data = await fetch(`/api/session?path=${encodeURIComponent(session.path)}`).then(r => r.json());

  if (data.error) {
    chat.innerHTML = `<div class="empty-state">加载失败: ${escapeHtml(data.error)}</div>`;
    return;
  }

  currentMessages = data.messages;
  currentSessionPath = session.path;
  const customTitle = data.metadata?.title || session.customTitle || '';
  const slug = session.slug || '';
  // When loaded via jump-to-pin / session-id lookup, session.id may be empty.
  // Derive it from the path basename so the copy-id chip always renders.
  const sessionId = session.id || (session.path || '').split('/').pop().replace(/\.jsonl$/, '');
  const displayTitle = customTitle || slug || session.firstMessage || sessionId;
  const idTag = `<span class="copy-session-id" title="${session.path}" style="color:var(--text-dim);font-size:12px;font-weight:400;cursor:pointer;margin-left:6px" data-path="${session.path}">${sessionId.substring(0,8)}</span>`;
  $('#sessionTitle').innerHTML = customTitle
    ? `<span style="color:#4ade80">${escapeHtml(customTitle)}</span> ${idTag}`
    : slug
      ? `<span style="color:#38bdf8">${escapeHtml(slug)}</span> ${idTag}`
      : `${escapeHtml(displayTitle)} ${idTag}`;
  $('#sessionTitle').querySelector('.copy-session-id')?.addEventListener('click', (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(e.target.dataset.path);
    const orig = e.target.textContent;
    e.target.textContent = '已复制!';
    e.target.style.color = '#4ade80';
    setTimeout(() => { e.target.textContent = orig; e.target.style.color = ''; }, 1000);
  });

  const userMsgCount = data.messages.filter(m => m.type === 'user' && m.parts?.some(p => p.type === 'text')).length;
  const totalMsgCount = data.messages.length;
  $('#msgCount').textContent = `${userMsgCount} 轮对话 / ${totalMsgCount} 条消息`;

  chat.innerHTML = '';
  currentRenderedGroups = [];
  renderMessages(chat, data.messages);
  // Leave a persistent 📌 marker on any pinned messages in this session.
  markPinAnchorsForCurrentSession();
  // Refresh the header 📌 navigator (hidden when this session has no pins).
  setupPinNav();
  // Scroll behaviour: export-from-pin > jump-to-pin > bottom (latest progress).
  if (pendingExport) {
    const target = pendingExport.uuid;
    pendingExport = null;
    const only = target ? new Set([target]) : undefined;
    setTimeout(() => {
      // Select ONLY the pin whose 导出 button was clicked — not every pin in the session.
      if (!exportMode) toggleExportMode(only);
      else preselectPinnedForExport(only);
      if (target) flashMessageByUuid(target); // then scroll+flash the specific pin (wins)
    }, 0);
  } else if (pendingJumpUuid) {
    const target = pendingJumpUuid;
    pendingJumpUuid = null;
    // Defer one task so layout settles, then scroll+flash.
    // (Don't use requestAnimationFrame — it can be throttled in background tabs.)
    setTimeout(() => flashMessageByUuid(target), 0);
  } else {
    chat.scrollTop = chat.scrollHeight;
  }
}

function flashWrapper(el) {
  if (!el) return;
  // Instant (not smooth): in long sessions the target can be 100k+ px away, where
  // smooth scrolling silently no-ops. The flash animation supplies the cue.
  el.scrollIntoView({ block: 'center' });
  el.classList.remove('pin-flash');
  void el.offsetWidth; // force reflow so the animation restarts on repeat jumps
  el.classList.add('pin-flash');
  setTimeout(() => el.classList.remove('pin-flash'), 2500);
}

function flashMessageByUuid(uuid) {
  if (!uuid) return;
  const el = document.querySelector(`.message-wrapper[data-uuids~="${cssEscape(uuid)}"]`);
  if (!el) { showToast('未找到对应消息（可能已被剪枝）'); return; }
  flashWrapper(el);
}

function renderMessages(container, messages) {
  let i = 0;
  while (i < messages.length) {
    const msg = messages[i];

    if (msg.type === 'user') {
      const hasToolResult = msg.parts?.some(p => p.type === 'tool_result');
      const hasText = msg.parts?.some(p => p.type === 'text' && p.text.trim());

      if (hasToolResult && !hasText) {
        for (const part of msg.parts) {
          if (part.type === 'tool_result') {
            const groupIdx = currentRenderedGroups.length;
            currentRenderedGroups.push({ role: 'tool_result', parts: [part], text: part.content || '' });
            renderToolResult(container, part, groupIdx);
          }
        }
      } else if (hasText) {
        const groupIdx = currentRenderedGroups.length;
        const text = msg.parts.filter(p => p.type === 'text').map(p => p.text).join('\n');
        const isCompactSummary = !!msg.isCompactSummary;
        currentRenderedGroups.push({ role: 'user', parts: msg.parts, text, timestamp: msg.timestamp, isCompactSummary });

        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper user-wrapper' + (isCompactSummary ? ' compact-summary' : '');
        if (msg.uuid) wrapper.dataset.uuids = msg.uuid;
        const userLabel = isCompactSummary ? '📦 压缩摘要 · Claude Code' : 'You';
        wrapper.innerHTML = `
          <input type="checkbox" class="msg-checkbox" data-group-idx="${groupIdx}" onchange="onCheckboxChange(this)">
          <div class="message-inner message user" data-group-idx="${groupIdx}">
            <div class="msg-label user-label">${userLabel}</div>
            <div class="msg-bubble">${escapeHtml(text)}</div>
            <div class="msg-actions">
              <button class="btn-small" onclick="copyMessageText(${groupIdx}, this)">复制</button>
            </div>
            ${msg.timestamp ? `<div class="msg-timestamp">${formatTime(msg.timestamp)}</div>` : ''}
          </div>
        `;
        container.appendChild(wrapper);
      }
    } else if (msg.type === 'assistant') {
      const parts = [...(msg.parts || [])];
      const groupUuids = [];
      if (msg.uuid) groupUuids.push(msg.uuid);
      let j = i + 1;
      while (j < messages.length && messages[j].type === 'assistant') {
        parts.push(...(messages[j].parts || []));
        if (messages[j].uuid) groupUuids.push(messages[j].uuid);
        j++;
      }

      const groupIdx = currentRenderedGroups.length;
      currentRenderedGroups.push({ role: 'assistant', parts, timestamp: msg.timestamp, model: msg.model });

      let innerHtml = '<div class="msg-label assistant-label">Claude</div>';

      for (const part of parts) {
        if (part.type === 'text' && part.text.trim()) {
          innerHtml += `<div class="msg-bubble markdown-body">${renderMarkdown(part.text)}</div>`;
        } else if (part.type === 'thinking' && part.text.trim()) {
          const id = 'think-' + Math.random().toString(36).substr(2, 8);
          const preview = part.text.substring(0, 80).replace(/\n/g, ' ');
          innerHtml += `
            <div class="thinking-block">
              <div class="thinking-header" onclick="toggleBlock('${id}', this)">
                <span class="arrow-icon">▶</span>
                思考过程 <span style="color:var(--text-dim);margin-left:8px;font-style:italic">${escapeHtml(preview)}...</span>
              </div>
              <div class="thinking-content" id="${id}">${escapeHtml(part.text)}</div>
            </div>
          `;
        } else if (part.type === 'tool_use') {
          const id = 'tool-' + Math.random().toString(36).substr(2, 8);
          const inputStr = JSON.stringify(part.input, null, 2);
          const shortInput = summarizeToolInput(part.name, part.input);
          innerHtml += `
            <div class="tool-block">
              <div class="tool-header" onclick="toggleBlock('${id}', this)">
                <span class="arrow-icon">▶</span>
                <span class="tool-name">${escapeHtml(part.name)}</span>
                <span style="color:var(--text-dim);margin-left:8px">${escapeHtml(shortInput)}</span>
              </div>
              <div class="tool-content" id="${id}">${escapeHtml(inputStr)}</div>
            </div>
          `;
        }
      }

      innerHtml += `<div class="msg-actions"><button class="btn-small" onclick="copyMessageText(${groupIdx}, this)">复制</button></div>`;
      if (msg.timestamp) {
        innerHtml += `<div class="msg-timestamp">${formatTime(msg.timestamp)}${msg.model ? ' · ' + msg.model : ''}</div>`;
      }

      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper';
      if (groupUuids.length) wrapper.dataset.uuids = groupUuids.join(' ');
      wrapper.innerHTML = `
        <input type="checkbox" class="msg-checkbox" data-group-idx="${groupIdx}" onchange="onCheckboxChange(this)">
        <div class="message-inner message assistant" data-group-idx="${groupIdx}">${innerHtml}</div>
      `;
      container.appendChild(wrapper);
      i = j;
      continue;
    } else if (msg.type === 'system') {
      const groupIdx = currentRenderedGroups.length;
      const content = typeof msg.content === 'string' ? msg.content :
        (Array.isArray(msg.content) ? msg.content.map(c => c.text || '').join('') : JSON.stringify(msg.content));
      currentRenderedGroups.push({ role: 'system', parts: [], text: content });

      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper';
      wrapper.innerHTML = `
        <input type="checkbox" class="msg-checkbox" data-group-idx="${groupIdx}" onchange="onCheckboxChange(this)">
        <div class="message-inner message assistant" data-group-idx="${groupIdx}">
          <div class="msg-label" style="color:var(--text-dim)">SYSTEM</div>
          <div class="msg-bubble" style="background:rgba(100,100,100,0.2);border:1px dashed var(--border);font-size:12px;color:var(--text-dim)">${escapeHtml(content.substring(0, 500))}${content.length > 500 ? '...' : ''}</div>
        </div>
      `;
      container.appendChild(wrapper);
    }
    i++;
  }
}

function renderToolResult(container, part, groupIdx) {
  const id = 'tr-' + Math.random().toString(36).substr(2, 8);
  const content = part.content || '';
  const preview = content.substring(0, 80).replace(/\n/g, ' ');
  const wrapper = document.createElement('div');
  wrapper.className = 'message-wrapper';
  wrapper.innerHTML = `
    <input type="checkbox" class="msg-checkbox" data-group-idx="${groupIdx}" onchange="onCheckboxChange(this)">
    <div class="message-inner message assistant" data-group-idx="${groupIdx}">
      <div class="tool-result-block">
        <div class="tool-result-header" onclick="toggleBlock('${id}', this)">
          <span class="arrow-icon">▶</span>
          工具结果 <span style="color:var(--text-dim);margin-left:8px">${escapeHtml(preview)}${content.length > 80 ? '...' : ''}</span>
        </div>
        <div class="tool-result-content" id="${id}">${escapeHtml(content)}</div>
      </div>
    </div>
  `;
  container.appendChild(wrapper);
}

function toggleBlock(id, headerEl) {
  const el = document.getElementById(id);
  el.classList.toggle('show');
  headerEl.querySelector('.arrow-icon').classList.toggle('open');
}

function summarizeToolInput(name, input) {
  if (!input) return '';
  if (name === 'Read' || name === 'Write') return input.file_path || '';
  if (name === 'Bash') return (input.command || '').substring(0, 60);
  if (name === 'Edit') return input.file_path || '';
  if (name === 'Grep') return input.pattern || '';
  if (name === 'Glob') return input.pattern || '';
  if (name === 'Agent') return input.description || '';
  if (input.command) return input.command.substring(0, 60);
  if (input.query) return input.query.substring(0, 60);
  return '';
}

// ── Markdown rendering (shared by the in-app view and the HTML export) ──
// A small, dependency-free block-level renderer: headers, GFM tables, lists,
// blockquotes, fenced code, horizontal rules and inline emphasis/links/code.
function mdInline(s) {
  if (s == null) return '';
  // Protect inline code spans so their contents aren't processed further.
  const codes = [];
  s = String(s).replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return '␀C' + (codes.length - 1) + '␀'; });
  s = escapeHtml(s);
  // Links: [text](url) — only allow safe schemes.
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (m, t, url) => {
    const safe = /^(https?:|mailto:|tel:|#|\/)/i.test(url) ? url : '#';
    return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${t}</a>`;
  });
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Italic with single * (no _ to avoid breaking snake_case identifiers).
  s = s.replace(/\*([^\s*][^*\n]*?)\*/g, '<em>$1</em>');
  s = s.replace(/␀C(\d+)␀/g, (m, i) => `<code>${escapeHtml(codes[+i])}</code>`);
  return s;
}

function mdSplitRow(row) {
  let r = row.trim().replace(/^\|/, '').replace(/\|$/, '');
  const cells = [];
  let cur = '';
  for (let k = 0; k < r.length; k++) {
    if (r[k] === '\\' && r[k + 1] === '|') { cur += '|'; k++; continue; }
    if (r[k] === '|') { cells.push(cur); cur = ''; continue; }
    cur += r[k];
  }
  cells.push(cur);
  return cells;
}

function mdIsTableStart(lines, i) {
  const sep = lines[i + 1];
  return sep != null
    && lines[i].includes('|')
    && sep.includes('|')
    && /-/.test(sep)
    && /^[\s|:-]+$/.test(sep);
}

function mdParseList(lines, start) {
  const first = lines[start].match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
  const baseIndent = first[1].length;
  const ordered = /\d/.test(first[2]);
  let i = start;
  let items = '';
  while (i < lines.length) {
    const m = lines[i].match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
    if (!m) {
      // Allow a single blank line inside a loose list, but only if the next
      // item is the same kind (so an ordered list after a bulleted one starts fresh).
      if (lines[i].trim() === '' && i + 1 < lines.length) {
        const nm = lines[i + 1].match(/^(\s*)([-*+]|\d+[.)])\s+/);
        if (nm && nm[1].length >= baseIndent && /\d/.test(nm[2]) === ordered) { i++; continue; }
      }
      break;
    }
    const indent = m[1].length;
    if (indent < baseIndent) break;
    if (indent > baseIndent) {
      const [child, ni] = mdParseList(lines, i);
      items = items.endsWith('</li>') ? items.slice(0, -5) + child + '</li>' : items + child;
      i = ni;
      continue;
    }
    if (/\d/.test(m[2]) !== ordered) break; // list type switched at the same level → new list
    items += `<li>${mdInline(m[3])}</li>`;
    i++;
  }
  return [(ordered ? '<ol>' : '<ul>') + items + (ordered ? '</ol>' : '</ul>'), i];
}

function renderMarkdown(text) {
  if (!text) return '';
  const lines = String(text).replace(/\r\n?/g, '\n').split('\n');
  const isBoundary = (ln, idx) =>
    ln.trim() === ''
    || /^\s*(`{3,}|~{3,})/.test(ln)
    || /^\s*#{1,6}\s/.test(ln)
    || /^\s*>\s?/.test(ln)
    || /^\s*([-*+]|\d+[.)])\s+/.test(ln)
    || /^\s*([-*_])(\s*\1){2,}\s*$/.test(ln)
    || mdIsTableStart(lines, idx);

  let html = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    const fence = line.match(/^\s*(`{3,}|~{3,})(.*)$/);
    if (fence) {
      const ticks = fence[1][0];
      const lang = fence[2].trim().split(/\s+/)[0];
      const closeRe = new RegExp('^\\s*' + (ticks === '`' ? '`' : '~') + '{3,}\\s*$');
      const buf = [];
      i++;
      while (i < lines.length && !closeRe.test(lines[i])) { buf.push(lines[i]); i++; }
      i++; // skip closing fence
      html += `<pre><code${lang ? ` class="language-${escapeAttr(lang)}"` : ''}>${escapeHtml(buf.join('\n'))}</code></pre>`;
      continue;
    }

    if (line.trim() === '') { i++; continue; }

    // Horizontal rule
    if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)) { html += '<hr>'; i++; continue; }

    // ATX header
    const h = line.match(/^\s*(#{1,6})\s+(.*?)\s*#*\s*$/);
    if (h) { const lvl = h[1].length; html += `<h${lvl}>${mdInline(h[2])}</h${lvl}>`; i++; continue; }

    // GFM table
    if (mdIsTableStart(lines, i)) {
      const header = mdSplitRow(lines[i]);
      const aligns = mdSplitRow(lines[i + 1]).map(c => {
        const t = c.trim(); const l = t.startsWith(':'), r = t.endsWith(':');
        return (l && r) ? 'center' : r ? 'right' : l ? 'left' : '';
      });
      i += 2;
      let rows = '';
      while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
        const cells = mdSplitRow(lines[i]);
        rows += '<tr>';
        for (let c = 0; c < header.length; c++) {
          const a = aligns[c] ? ` style="text-align:${aligns[c]}"` : '';
          rows += `<td${a}>${mdInline((cells[c] || '').trim())}</td>`;
        }
        rows += '</tr>';
        i++;
      }
      let thead = '<tr>';
      header.forEach((c, idx) => {
        const a = aligns[idx] ? ` style="text-align:${aligns[idx]}"` : '';
        thead += `<th${a}>${mdInline(c.trim())}</th>`;
      });
      thead += '</tr>';
      html += `<table><thead>${thead}</thead><tbody>${rows}</tbody></table>`;
      continue;
    }

    // Blockquote
    if (/^\s*>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
      html += `<blockquote>${renderMarkdown(buf.join('\n'))}</blockquote>`;
      continue;
    }

    // Lists
    if (/^\s*([-*+]|\d+[.)])\s+/.test(line)) {
      const [listHtml, ni] = mdParseList(lines, i);
      html += listHtml; i = ni; continue;
    }

    // Paragraph
    const buf = [line]; i++;
    while (i < lines.length && !isBoundary(lines[i], i)) { buf.push(lines[i]); i++; }
    html += `<p>${mdInline(buf.join('\n')).replace(/\n/g, '<br>')}</p>`;
  }
  return html;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d.getTime())) return ts;
  return d.toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

// ── Session type filter ──
let currentFilter = 'all';
let hideUnnamed = localStorage.getItem('hideUnnamed') === '1';
let hideAbandoned = localStorage.getItem('hideAbandoned') !== '0';

function setFilter(type) {
  currentFilter = type;
  $$('.filter-pill[data-filter]').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === type);
  });
  applyFilters();
}

function toggleHideUnnamed() {
  hideUnnamed = !hideUnnamed;
  localStorage.setItem('hideUnnamed', hideUnnamed ? '1' : '0');
  document.getElementById('hideUnnamedToggle').classList.toggle('active', hideUnnamed);
  applyFilters();
}

function toggleHideAbandoned() {
  hideAbandoned = !hideAbandoned;
  localStorage.setItem('hideAbandoned', hideAbandoned ? '1' : '0');
  document.getElementById('hideAbandonedToggle').classList.toggle('active', hideAbandoned);
  applyFilters();
}

function applyFilters() {
  const q = ($('#searchInput').value || '').toLowerCase();
  $$('.session-item').forEach(el => {
    const type = el.dataset.sessionType || 'manual';
    const archived = el.dataset.archived === '1';
    // Archive filter rules:
    //   'archived' pill: show only archived
    //   any other pill: hide archived by default
    let typeMatch;
    if (currentFilter === 'archived') {
      typeMatch = archived;
    } else if (currentFilter === 'all') {
      // 心跳 session（sdk-cli 无状态调用）默认不出现在「全部」里，
      // 想看的话需要点 🔍 心跳 pill 切到 headless 视图。
      typeMatch = !archived && type !== 'headless';
    } else {
      typeMatch = !archived && type === currentFilter;
    }
    const title = el.querySelector('.title')?.textContent.toLowerCase() || '';
    const meta = el.querySelector('.meta')?.textContent.toLowerCase() || '';
    const preview = el.querySelector('.preview')?.textContent.toLowerCase() || '';
    const textMatch = !q || title.includes(q) || meta.includes(q) || preview.includes(q);
    const hasName = el.dataset.hasName === '1';
    const nameMatch = !hideUnnamed || hasName;
    // "废弃" = 在 fork group 里的 ancestor，并且自身已超过 48h 没有新活动。
    // 这样 root 如果还在被用，就不会被自动藏掉。
    const ABANDON_THRESHOLD_SEC = 48 * 3600;
    const nowSec = Date.now() / 1000;
    const lastActivity = parseFloat(el.dataset.lastActivity || '0');
    const stale = lastActivity > 0 && (nowSec - lastActivity) > ABANDON_THRESHOLD_SEC;
    const isAbandoned = el.classList.contains('is-ancestor') && !!el.closest('.fork-group') && stale;
    const abandonedMatch = !hideAbandoned || !isAbandoned;
    el.style.display = (typeMatch && textMatch && nameMatch && abandonedMatch) ? '' : 'none';
  });
  // Hide fork groups whose children are all hidden; auto-expand when filtering
  $$('.fork-group').forEach(group => {
    const children = group.querySelector('.fork-group-children');
    const items = $$('.session-item', children);
    const visibleCount = Array.from(items).filter(el => el.style.display !== 'none').length;
    group.style.display = visibleCount > 0 ? '' : 'none';
    if (q && visibleCount > 0) {
      group.querySelector('.fork-group-header').classList.add('expanded');
      children.classList.add('show');
    }
  });
}

// ── In-page find ──
let findHits = [];          // array of <mark class="find-hit"> elements
let findCurrent = -1;        // index into findHits
const FIND_SKIP_SELECTOR = '.msg-label, .msg-timestamp, .msg-actions, .btn-small, .arrow-icon, .fork-group, .session-item, .find-bar, .main-header';

function toggleFindBar() {
  const bar = $('#findBar');
  if (bar.classList.contains('show')) {
    closeFindBar();
  } else {
    bar.classList.add('show');
    const input = $('#findInput');
    input.focus();
    input.select();
  }
}

function closeFindBar() {
  $('#findBar').classList.remove('show');
  clearFindHighlights();
  $('#findInput').value = '';
  $('#findCount').textContent = '0 / 0';
}

function clearFindHighlights() {
  // Replace every <mark.find-hit> with its text content, then normalize to merge text nodes.
  const marks = $$('.find-hit', $('#chatContainer'));
  const parents = new Set();
  marks.forEach(m => {
    const parent = m.parentNode;
    if (parent) {
      parent.replaceChild(document.createTextNode(m.textContent), m);
      parents.add(parent);
    }
  });
  parents.forEach(p => p.normalize && p.normalize());
  findHits = [];
  findCurrent = -1;
}

function runFind(query) {
  clearFindHighlights();
  if (!query) {
    $('#findCount').textContent = '0 / 0';
    return;
  }
  const chat = $('#chatContainer');
  const qLower = query.toLowerCase();
  // Walk text nodes, skipping non-content areas
  const walker = document.createTreeWalker(chat, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      if (!node.nodeValue || !node.nodeValue.toLowerCase().includes(qLower)) return NodeFilter.FILTER_REJECT;
      // Skip if any ancestor matches skip selectors
      let el = node.parentElement;
      while (el && el !== chat) {
        if (el.classList && (el.classList.contains('msg-label') || el.classList.contains('msg-timestamp') || el.classList.contains('msg-actions') || el.classList.contains('btn-small'))) {
          return NodeFilter.FILTER_REJECT;
        }
        el = el.parentElement;
      }
      return NodeFilter.FILTER_ACCEPT;
    },
  });
  const targets = [];
  let n;
  while ((n = walker.nextNode())) targets.push(n);

  const collapsedToOpen = new Set();
  for (const node of targets) {
    const text = node.nodeValue;
    const lower = text.toLowerCase();
    const frag = document.createDocumentFragment();
    let i = 0;
    while (i < text.length) {
      const idx = lower.indexOf(qLower, i);
      if (idx === -1) {
        frag.appendChild(document.createTextNode(text.slice(i)));
        break;
      }
      if (idx > i) frag.appendChild(document.createTextNode(text.slice(i, idx)));
      const mark = document.createElement('mark');
      mark.className = 'find-hit';
      mark.textContent = text.slice(idx, idx + query.length);
      frag.appendChild(mark);
      findHits.push(mark);
      // Track collapsed ancestors (thinking/tool/tool-result content) to auto-expand
      let anc = mark.parentElement || node.parentElement;
      // Actually use the original node's parent chain
      let chainEl = node.parentElement;
      while (chainEl && chainEl !== chat) {
        if (chainEl.classList && (chainEl.classList.contains('thinking-content') || chainEl.classList.contains('tool-content') || chainEl.classList.contains('tool-result-content'))) {
          if (!chainEl.classList.contains('show')) collapsedToOpen.add(chainEl);
        }
        chainEl = chainEl.parentElement;
      }
      i = idx + query.length;
    }
    node.parentNode.replaceChild(frag, node);
  }

  // Open collapsed blocks that contain a hit; toggle their arrow
  collapsedToOpen.forEach(el => {
    el.classList.add('show');
    const header = el.previousElementSibling;
    if (header) {
      const arrow = header.querySelector('.arrow-icon');
      if (arrow) arrow.classList.add('open');
    }
  });

  if (findHits.length) {
    findCurrent = 0;
    setCurrentHit(0, true);
  }
  updateFindCount();
}

function setCurrentHit(idx, scroll) {
  findHits.forEach(m => m.classList.remove('current'));
  if (idx < 0 || idx >= findHits.length) return;
  const el = findHits[idx];
  el.classList.add('current');
  if (scroll) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  updateFindCount();
}

function updateFindCount() {
  const total = findHits.length;
  const cur = total ? findCurrent + 1 : 0;
  $('#findCount').textContent = `${cur} / ${total}`;
  $('#findPrevBtn').disabled = total < 2;
  $('#findNextBtn').disabled = total < 2;
}

function findNext() {
  if (!findHits.length) return;
  findCurrent = (findCurrent + 1) % findHits.length;
  setCurrentHit(findCurrent, true);
}

function findPrev() {
  if (!findHits.length) return;
  findCurrent = (findCurrent - 1 + findHits.length) % findHits.length;
  setCurrentHit(findCurrent, true);
}

let findTimer = null;
$('#findInput').addEventListener('input', (e) => {
  clearTimeout(findTimer);
  findTimer = setTimeout(() => runFind(e.target.value.trim()), 150);
});

$('#findInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (e.shiftKey) findPrev(); else findNext();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    closeFindBar();
  }
});

// Global Cmd+F / Ctrl+F opens in-page find when a session is open
document.addEventListener('keydown', (e) => {
  // Esc closes the pinned view (mirrors the 「关闭」button / clicking a session)
  if (e.key === 'Escape' && $('#pinnedView').classList.contains('show')) {
    e.preventDefault();
    hidePinnedView();
    return;
  }
  const isFind = (e.metaKey || e.ctrlKey) && (e.key === 'f' || e.key === 'F');
  if (!isFind) return;
  if ($('#mainHeader').style.display === 'none') return; // no session loaded
  e.preventDefault();
  toggleFindBar();
});

// ── Scroll buttons ──
function scrollToBottom() {
  const chat = $('#chatContainer');
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
}

function scrollToTop() {
  const chat = $('#chatContainer');
  chat.scrollTo({ top: 0, behavior: 'smooth' });
}

$('#chatContainer').addEventListener('scroll', () => {
  const chat = $('#chatContainer');
  const distFromBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight;
  const distFromTop = chat.scrollTop;
  $('#scrollBottomBtn').classList.toggle('show', distFromBottom > 300);
  $('#scrollTopBtn').classList.toggle('show', distFromTop > 300);
});

// ── Session ID lookup (cross-project) ──
// Triggered when the search box contains UUID-shaped text. The user has the
// session id (e.g., from a previous link or Claude desktop) but doesn't know
// which project owns it.
function looksLikeSessionId(s) {
  if (!s) return false;
  // Strip dashes and check if it's 8+ hex chars. UUID is 32 hex + 4 dashes = 36.
  const cleaned = s.replace(/-/g, '');
  return /^[0-9a-f]{8,32}$/i.test(cleaned);
}

function isFullSessionId(s) {
  return s.replace(/-/g, '').length >= 30;
}

function clearSessionIdResults() {
  const existing = document.getElementById('sidIdMatches');
  if (existing) existing.remove();
}

function renderSessionIdResults(matches, query) {
  clearSessionIdResults();
  const container = document.createElement('div');
  container.id = 'sidIdMatches';
  container.style.cssText = 'background:rgba(245,158,11,0.06); border-bottom:1px solid var(--border); padding:10px 14px;';
  const header = matches.length
    ? `🆔 Session ID 匹配 (${matches.length})`
    : `🆔 未找到匹配 "${query}"`;
  let html = `<div style="font-size:11px;color:#f59e0b;margin-bottom:8px;font-weight:600">${escapeHtml(header)}</div>`;
  for (const m of matches) {
    const title = m.customTitle || m.firstMessage || m.slug || m.id;
    const date = new Date(m.modified * 1000);
    const dateStr = date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    html += `
      <div class="sid-match" data-path="${escapeAttr(m.path)}" data-project="${escapeAttr(m.project)}" style="padding:8px 10px;cursor:pointer;border-radius:6px;margin-bottom:6px;background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.18);">
        <div style="font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px">${escapeHtml(title)}</div>
        <div style="font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">📁 ${escapeHtml(m.projectDisplay || m.project)}</div>
        <div style="font-size:10px;color:var(--text-dim);font-family:'SF Mono',monospace;margin-top:2px">${escapeHtml(m.id)} · ${dateStr}</div>
      </div>`;
  }
  container.innerHTML = html;
  container.querySelectorAll('.sid-match').forEach(el => {
    el.addEventListener('click', () => openSessionByPath(el.dataset.project, el.dataset.path));
    el.addEventListener('mouseenter', () => { el.style.background = 'rgba(245,158,11,0.12)'; });
    el.addEventListener('mouseleave', () => { el.style.background = 'rgba(245,158,11,0.05)'; });
  });
  $('#sidebarContent').prepend(container);
}

async function openSessionByPath(projectId, sessionPath) {
  if (!projectId || !sessionPath) return;
  const header = $(`.project-header[data-project="${projectId}"]`);
  if (header && !header.classList.contains('expanded')) {
    await toggleProject(projectId);
  }
  const item = document.querySelector(`.session-item[data-path="${cssEscape(sessionPath)}"]`);
  if (item) {
    // Make sure it's visible even if a current pill filter would hide it
    item.style.display = '';
    const forkParent = item.closest('.fork-group');
    if (forkParent) {
      forkParent.style.display = '';
      const fh = forkParent.querySelector('.fork-group-header');
      const fc = forkParent.querySelector('.fork-group-children');
      if (fh) fh.classList.add('expanded');
      if (fc) fc.classList.add('show');
    }
    item.scrollIntoView({ block: 'center', behavior: 'smooth' });
    item.click();
  } else {
    await loadSession({ path: sessionPath, id: '', customTitle: '', firstMessage: '', slug: '' });
  }
}

let sessionIdLookupSeq = 0;
async function maybeSessionIdLookup(rawQuery) {
  const q = rawQuery.trim();
  if (!looksLikeSessionId(q)) {
    clearSessionIdResults();
    return false;
  }
  const seq = ++sessionIdLookupSeq;
  $('#searchMode').textContent = 'Session ID 查找中...';
  try {
    const res = await fetch(`/api/find-session?id=${encodeURIComponent(q)}`).then(r => r.json());
    if (seq !== sessionIdLookupSeq) return true; // newer query in flight
    const matches = res.matches || [];
    renderSessionIdResults(matches, q);
    if (matches.length === 0) {
      $('#searchMode').textContent = '未找到 ID';
    } else if (matches.length === 1) {
      $('#searchMode').textContent = '1 个匹配';
      if (isFullSessionId(q)) {
        const m = matches[0];
        openSessionByPath(m.project, m.path);
      }
    } else {
      $('#searchMode').textContent = `${matches.length} 个匹配`;
    }
  } catch (err) {
    if (seq === sessionIdLookupSeq) $('#searchMode').textContent = '查找失败';
  }
  return true;
}

// Debounced title-only filter on input
let searchTimer = null;
$('#searchInput').addEventListener('input', (e) => {
  const raw = e.target.value;
  const q = raw.toLowerCase();
  // Clear full-text results, restore normal list
  $$('.search-result-item').forEach(el => el.remove());
  clearTimeout(searchTimer);
  if (looksLikeSessionId(raw.trim())) {
    // Defer the network call slightly so typing doesn't fire on every keystroke
    searchTimer = setTimeout(() => maybeSessionIdLookup(raw), 200);
    return;
  }
  clearSessionIdResults();
  $('#searchMode').textContent = q ? '标题' : '';
  applyFilters();
});

// Enter triggers full-text search via backend
$('#searchInput').addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim();
  if (!q) return;

  // Find which project is currently expanded
  const expandedHeader = document.querySelector('.project-header.expanded');
  if (!expandedHeader) return;
  const projectId = expandedHeader.dataset.project;
  if (!projectId) return;
  const expandedProject = expandedHeader.closest('.project-item');

  $('#searchMode').textContent = '全文搜索中...';

  try {
    const results = await fetch(`/api/search?project=${encodeURIComponent(projectId)}&q=${encodeURIComponent(q)}`).then(r => r.json());

    // Hide all normal items, show search results
    const list = expandedProject.querySelector('.session-list');
    $$('.session-item', list).forEach(el => el.style.display = 'none');
    $$('.search-result-item', list).forEach(el => el.remove());

    if (results.length === 0) {
      $('#searchMode').textContent = '无结果';
      return;
    }

    $('#searchMode').textContent = `${results.length} 个 session`;

    for (const r of results) {
      const item = document.createElement('div');
      const classes = ['session-item', 'search-result-item'];
      if (r.sessionType === 'scheduled') classes.push('scheduled');
      if (r.isArchived) classes.push('archived');
      item.className = classes.join(' ');
      item.dataset.path = r.path;
      item.dataset.project = projectId;
      item.dataset.sessionType = r.sessionType || 'manual';
      item.dataset.archived = r.isArchived ? '1' : '0';

      const date = new Date(r.modified * 1000);
      const dateStr = date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
      const displayTitle = r.customTitle || r.slug || r.firstMessage || r.id;
      const titleHtml = r.customTitle
        ? `<span style="color:#4ade80;font-weight:600">${escapeHtml(r.customTitle)}</span>`
        : r.slug
          ? `<span style="color:#38bdf8">${escapeHtml(r.slug)}</span>`
          : escapeHtml(displayTitle);

      // Highlight query in snippets
      const snippetsHtml = r.matches.map(m => {
        const hl = escapeHtml(m.snippet).replace(
          new RegExp(escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
          match => `<mark style="background:#f59e0b33;color:#f59e0b;padding:0 2px;border-radius:2px">${match}</mark>`
        );
        const icon = m.role === 'user' ? '👤' : '🤖';
        return `<div style="font-size:11px;color:var(--text-dim);margin-top:3px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${icon} ${hl}</div>`;
      }).join('');

      item.innerHTML = `
        <div class="title">${titleHtml} <span style="color:#f59e0b;font-size:11px">(${r.matchCount} 处匹配)</span></div>
        ${snippetsHtml}
        <div class="meta">
          <span>${dateStr}</span>
          <span>${r.id.substring(0, 8)}</span>
        </div>
      `;
      item.addEventListener('click', () => loadSession(r));
      list.prepend(item);
    }
  } catch (err) {
    $('#searchMode').textContent = '搜索出错';
  }
});

init();
</script>
</body>
</html>
