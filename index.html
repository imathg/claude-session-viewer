<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Session Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --bg-sidebar: #16213e;
  --bg-card: #0f3460;
  --bg-user: #533483;
  --bg-assistant: #1a1a3e;
  --bg-thinking: #2a1a3e;
  --bg-tool: #1a2a3e;
  --text: #e0e0e0;
  --text-dim: #8a8aaa;
  --accent: #e94560;
  --accent2: #0ea5e9;
  --border: #2a2a4e;
  --scrollbar: #333;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 320px;
  min-width: 320px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header svg { width: 22px; height: 22px; }

.sidebar-content {
  overflow-y: auto;
  flex: 1;
}

.project-item {
  border-bottom: 1px solid var(--border);
}

.project-header {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.15s;
  font-size: 13px;
}

.project-header:hover { background: rgba(255,255,255,0.05); }

.project-header .name {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.project-header .badge {
  background: var(--accent);
  color: white;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
  flex-shrink: 0;
}

.project-header .arrow {
  margin-right: 8px;
  transition: transform 0.2s;
  flex-shrink: 0;
  font-size: 11px;
  color: var(--text-dim);
}

.project-header.expanded .arrow { transform: rotate(90deg); }

.session-list { display: none; }
.session-list.show { display: block; }

.session-item {
  padding: 10px 16px 10px 28px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.15s;
}

.session-item:hover { background: rgba(255,255,255,0.05); }
.session-item.active { background: var(--bg-card); border-left: 3px solid var(--accent); }

.session-item .title {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
  color: var(--text);
}

.session-item .title span { font-size: 12px; }

.session-item .preview {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
  opacity: 0.7;
}

/* When a fork-branch child has the same title as its group, the title is
   omitted and the preview becomes the primary line. */
.session-item.fork-branch .preview {
  font-size: 12px;
  color: var(--text);
  opacity: 1;
}

.session-item .ancestor-tag {
  color: #86efac;
  background: rgba(34, 197, 94, 0.12);
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 10px;
  margin-left: auto;
}

.session-item .meta {
  color: var(--text-dim);
  font-size: 11px;
  display: flex;
  gap: 12px;
}

/* Main content */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.main-header {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  color: var(--text-dim);
  background: var(--bg-sidebar);
  display: flex;
  align-items: center;
  gap: 12px;
}

.main-header .session-title {
  font-weight: 600;
  color: var(--text);
  font-size: 15px;
}

.main-header .msg-count {
  font-size: 12px;
  background: var(--border);
  padding: 2px 8px;
  border-radius: 8px;
}

.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 16px;
  flex-direction: column;
  gap: 8px;
}

/* Messages */
.message {
  margin-bottom: 16px;
  max-width: 900px;
}

.message.user {
  margin-left: auto;
  margin-right: 0;
}

.msg-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  padding-left: 4px;
}

.msg-label.user-label { color: #c084fc; text-align: right; padding-right: 4px; }
.msg-label.assistant-label { color: var(--accent2); }
/* compact summary = Claude Code's /compact artifact, stored as a user message.
   De-emphasise it so it's distinguishable from real input at a glance. */
.user-wrapper.compact-summary .msg-label.user-label { color: var(--text-dim); }
.user-wrapper.compact-summary .msg-bubble { opacity: 0.65; font-size: 13px; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-x: auto;
}

.message.user .msg-bubble {
  background: var(--bg-user);
  border-bottom-right-radius: 4px;
}

.message.assistant .msg-bubble {
  background: var(--bg-assistant);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.msg-timestamp {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  padding-left: 4px;
}

.message.user .msg-timestamp { text-align: right; padding-right: 4px; }

/* Copy button */
.msg-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  padding-left: 4px;
}

.message.user .msg-actions { justify-content: flex-end; padding-right: 4px; }

.btn-small {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.btn-small:hover { background: rgba(255,255,255,0.12); color: var(--text); }
.btn-small.copied { color: #4ade80; border-color: rgba(34,197,94,0.4); }

/* Per-session pin navigator — jump between 📌 anchors, in or out of export mode */
.pin-nav { display: inline-flex; align-items: center; gap: 6px; }
.pin-nav-label { font-size: 11px; font-weight: 600; color: #f59e0b; white-space: nowrap; }
.pin-nav-btn {
  background: rgba(245,158,11,0.10);
  border: 1px solid rgba(245,158,11,0.35);
  color: #f59e0b;
  font-size: 11px;
  line-height: 1;
  padding: 4px 9px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.pin-nav-btn:hover { background: rgba(245,158,11,0.22); }

/* Checkbox for export selection */
.msg-checkbox {
  display: none;
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

.export-mode .message-wrapper { display: flex; align-items: flex-start; gap: 10px; }
.export-mode .message-wrapper .msg-checkbox { display: block; margin-top: 10px; }
.export-mode .message-wrapper.user-wrapper { flex-direction: row-reverse; }
.export-mode .message-wrapper .message-inner { flex: 1; min-width: 0; }

.message-wrapper.selected-for-export .message-inner {
  outline: 2px solid var(--accent);
  outline-offset: 4px;
  border-radius: 12px;
}

/* Export toolbar */
.export-toolbar {
  display: none;
  padding: 10px 24px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.export-toolbar.show { display: flex; }

.export-toolbar .btn {
  background: var(--accent);
  color: white;
  border: none;
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.15s;
}

.export-toolbar .btn:hover { opacity: 0.85; }

.export-toolbar .btn.secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}

.export-toolbar .btn.secondary:hover { background: rgba(255,255,255,0.05); }

.export-toolbar .btn.export-btn { background: #16a34a; }

.export-toolbar .btn.nav-btn {
  padding: 6px 11px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  line-height: 1;
}
.export-toolbar .btn.nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.05); }
.export-toolbar .btn.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.export-toolbar .selection-info {
  font-size: 12px;
  color: var(--text-dim);
  margin-left: auto;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1e293b;
  color: #e0e0e0;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.25s;
  z-index: 100;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

/* Thinking block */
.thinking-block {
  margin: 8px 0;
  border: 1px solid rgba(139, 92, 246, 0.3);
  border-radius: 8px;
  overflow: hidden;
}

.thinking-header {
  padding: 8px 12px;
  background: var(--bg-thinking);
  cursor: pointer;
  font-size: 12px;
  color: #c084fc;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.thinking-header:hover { background: rgba(139, 92, 246, 0.15); }

.thinking-content {
  display: none;
  padding: 12px;
  background: rgba(42, 26, 62, 0.5);
  font-size: 13px;
  color: #c0b0d0;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
}

.thinking-content.show { display: block; }

/* Tool blocks */
.tool-block {
  margin: 8px 0;
  border: 1px solid rgba(14, 165, 233, 0.3);
  border-radius: 8px;
  overflow: hidden;
}

.tool-header {
  padding: 8px 12px;
  background: var(--bg-tool);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.tool-header:hover { background: rgba(14, 165, 233, 0.12); }

.tool-name {
  color: var(--accent2);
  font-weight: 600;
}

.tool-content {
  display: none;
  padding: 12px;
  background: rgba(26, 42, 62, 0.5);
  font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
  color: #a0c0d0;
}

.tool-content.show { display: block; }

.tool-result-block {
  margin: 8px 0;
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: 8px;
  overflow: hidden;
}

.tool-result-header {
  padding: 8px 12px;
  background: rgba(26, 42, 30, 0.8);
  cursor: pointer;
  font-size: 12px;
  color: #4ade80;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.tool-result-header:hover { background: rgba(34, 197, 94, 0.12); }

.tool-result-content {
  display: none;
  padding: 12px;
  background: rgba(26, 42, 30, 0.4);
  font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 400px;
  overflow-y: auto;
  color: #a0d0a0;
}

.tool-result-content.show { display: block; }

.arrow-icon { font-size: 10px; transition: transform 0.2s; }
.arrow-icon.open { transform: rotate(90deg); }

/* Code blocks in messages */
.msg-bubble code {
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
}

.msg-bubble pre {
  background: rgba(0,0,0,0.3);
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 8px 0;
}

.msg-bubble pre code {
  background: none;
  padding: 0;
}

/* Rendered markdown (assistant bubbles) */
.msg-bubble.markdown-body { white-space: normal; }
.msg-bubble.markdown-body > :first-child { margin-top: 0; }
.msg-bubble.markdown-body > :last-child { margin-bottom: 0; }
.msg-bubble p { margin: 0 0 10px; }
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3,
.msg-bubble h4, .msg-bubble h5, .msg-bubble h6 { margin: 14px 0 6px; line-height: 1.3; font-weight: 600; }
.msg-bubble h1 { font-size: 19px; }
.msg-bubble h2 { font-size: 17px; }
.msg-bubble h3 { font-size: 15px; }
.msg-bubble h4, .msg-bubble h5, .msg-bubble h6 { font-size: 14px; color: var(--text-dim); }
.msg-bubble ul, .msg-bubble ol { margin: 6px 0 10px; padding-left: 22px; }
.msg-bubble li { margin: 3px 0; }
.msg-bubble li > ul, .msg-bubble li > ol { margin: 3px 0; }
.msg-bubble blockquote { margin: 8px 0; padding: 2px 12px; border-left: 3px solid var(--border); color: var(--text-dim); }
.msg-bubble a { color: var(--accent2); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.15); }
.msg-bubble a:hover { border-bottom-color: var(--accent2); }
.msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.msg-bubble del { opacity: 0.6; }
.msg-bubble table { border-collapse: collapse; margin: 10px 0; font-size: 13px; display: block; max-width: 100%; overflow-x: auto; }
.msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
.msg-bubble th { background: rgba(255,255,255,0.04); font-weight: 600; }
.msg-bubble tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--text-dim);
}

.loading::after {
  content: '';
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Filter pills */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 8px 16px 4px;
}

.filter-pill {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
}

.filter-pill:hover { color: var(--text); background: rgba(255,255,255,0.08); }

.filter-pill.active {
  background: var(--accent2);
  color: white;
  border-color: var(--accent2);
}

/* Toggle-style pill (independent of the tab filters) */
.filter-pill.toggle-pill {
  margin-left: auto;
}
.filter-pill.toggle-pill.active {
  background: rgba(34, 197, 94, 0.2);
  color: #86efac;
  border-color: rgba(34, 197, 94, 0.4);
}

/* Scheduled task session styling */
.session-item.scheduled .title {
  color: #fbbf24;
}

.session-item.scheduled .title::before {
  content: '⏱ ';
  opacity: 0.7;
}

.session-item.headless .title { color: #facc15; }
.session-item.headless .title::before {
  content: '🔍 ';
  opacity: 0.85;
}

/* Archived session styling */
.session-item.archived {
  opacity: 0.55;
}

.session-item.archived .title::after {
  content: ' 📦';
  font-size: 11px;
  opacity: 0.7;
}

.session-item .unarchive-btn {
  background: rgba(74, 222, 128, 0.08);
  border: 1px solid rgba(74, 222, 128, 0.3);
  color: #86efac;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 8px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.session-item .unarchive-btn:hover {
  background: rgba(74, 222, 128, 0.2);
  color: #4ade80;
  border-color: #4ade80;
  opacity: 1;
}
.session-item .unarchive-btn:disabled {
  opacity: 0.5;
  cursor: default;
}
.session-item.archived:hover .unarchive-btn { opacity: 1; }
.session-item.archived { opacity: 0.55; }
.session-item.archived .unarchive-btn { opacity: 0.85; }

/* Search */
.search-box {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.search-box input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
  color: var(--text);
  font-size: 13px;
  outline: none;
}

.search-box input:focus { border-color: var(--accent2); }
.search-box input::placeholder { color: var(--text-dim); }

/* Config panel */
.config-panel {
  display: none;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
}

.config-panel.show { display: block; }

.config-panel .config-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.config-panel .config-row {
  display: flex;
  gap: 8px;
}

.config-panel input {
  flex: 1;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: rgba(0,0,0,0.25);
  color: var(--text);
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  outline: none;
}

.config-panel input:focus { border-color: var(--accent2); }

.config-panel .config-btn {
  padding: 7px 14px;
  border: none;
  border-radius: 6px;
  background: var(--accent2);
  color: white;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}

.config-panel .config-btn:hover { opacity: 0.85; }

.config-panel .config-status {
  font-size: 11px;
  margin-top: 6px;
  color: var(--text-dim);
}

.config-panel .config-status.ok { color: #4ade80; }
.config-panel .config-status.err { color: var(--accent); }

.sidebar-header .settings-btn {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.sidebar-header .settings-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.sidebar-header .settings-btn.active { color: var(--accent2); border-color: var(--accent2); }

/* No-config empty state */
.no-config {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  gap: 12px;
}

.no-config .icon { font-size: 36px; opacity: 0.4; }
.no-config .title { font-size: 14px; color: var(--text); }
.no-config .desc { font-size: 12px; color: var(--text-dim); line-height: 1.6; }

.no-config .setup-btn {
  margin-top: 8px;
  padding: 8px 20px;
  border: none;
  border-radius: 8px;
  background: var(--accent2);
  color: white;
  font-size: 13px;
  cursor: pointer;
}

.no-config .setup-btn:hover { opacity: 0.85; }

/* Scroll-to-bottom button */
.scroll-bottom-btn {
  position: absolute;
  bottom: 24px;
  right: 32px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.scroll-bottom-btn.show {
  opacity: 1;
  pointer-events: auto;
}

.scroll-bottom-btn:hover {
  background: var(--accent2);
  color: white;
  border-color: var(--accent2);
}

/* Worktree nodes inline with sessions */
.session-list .worktree-item .project-header {
  padding: 10px 12px 10px 18px;
  font-size: 12px;
  border-left: 2px solid rgba(34, 197, 94, 0.25);
}
.session-list .worktree-item .project-header .name { color: #86efac; }

.project-header .wt-count {
  color: #86efac;
  font-size: 10px;
  padding: 1px 6px;
  background: rgba(34, 197, 94, 0.12);
  border-radius: 8px;
  margin-right: 6px;
  flex-shrink: 0;
}

.wt-icon {
  margin-right: 4px;
  font-size: 11px;
  opacity: 0.85;
}

/* Fork group */
.fork-group {
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.fork-group-header {
  padding: 8px 16px 8px 22px;
  cursor: pointer;
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s;
  user-select: none;
}

.fork-group-header:hover { background: rgba(255,255,255,0.04); }

.fork-group-header .arrow {
  font-size: 9px;
  color: var(--text-dim);
  transition: transform 0.2s;
}

.fork-group-header.expanded .arrow { transform: rotate(90deg); }

.fork-group-header .fork-icon {
  color: #f59e0b;
}

.fork-group-header .fork-label {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.fork-group-header .fork-count {
  background: rgba(245, 158, 11, 0.15);
  color: #f59e0b;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  flex-shrink: 0;
}

.fork-group-children {
  display: none;
  border-left: 2px solid rgba(245, 158, 11, 0.3);
  margin-left: 22px;
}

.fork-group-children.show { display: block; }

.fork-group-children .session-item { padding-left: 16px; }

/* Find-in-page bar */
.find-bar {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
}

.find-bar.show { display: flex; }

.find-bar input {
  flex: 1;
  max-width: 260px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: rgba(0,0,0,0.25);
  color: var(--text);
  font-size: 13px;
  outline: none;
}

.find-bar input:focus { border-color: var(--accent2); }

.find-bar .find-count {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 52px;
  text-align: center;
}

.find-bar .find-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12px;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.find-bar .find-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
.find-bar .find-btn:disabled { opacity: 0.4; cursor: default; }

.find-hit {
  background: rgba(245, 158, 11, 0.35);
  color: inherit;
  padding: 0 1px;
  border-radius: 2px;
}

.find-hit.current {
  background: #f59e0b;
  color: #1a1a2e;
  box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.4);
}

/* Pinned button (sidebar header) */
.sidebar-header .pinned-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  height: 28px;
  padding: 0 10px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  transition: all 0.15s;
  flex-shrink: 0;
  margin-left: auto;
}
.sidebar-header .pinned-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.sidebar-header .pinned-btn.active { color: #f59e0b; border-color: #f59e0b; background: rgba(245, 158, 11, 0.08); }
.sidebar-header .pinned-btn .pin-count {
  background: rgba(245, 158, 11, 0.2);
  color: #f59e0b;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 2px;
}
/* When the pin button is the second control, demote settings btn margin */
.sidebar-header .pinned-btn + .settings-btn { margin-left: 6px; }

/* Pin indicator on session-item */
.session-item .pin-indicator {
  color: #f59e0b;
  margin-left: 4px;
  font-size: 11px;
  flex-shrink: 0;
}
.session-item.has-pin { box-shadow: inset 3px 0 0 rgba(245, 158, 11, 0.55); }
.session-item.has-pin .title::before {
  content: '🔔 ';
  font-size: 11px;
  color: #f59e0b;
}

/* Pinned-view (main area takeover) */
.pinned-view {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
}
.pinned-view.show { display: block; }
.pinned-view .pv-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.pinned-view .pv-title { font-size: 18px; font-weight: 600; color: var(--text); }
.pinned-view .pv-subtitle { font-size: 12px; color: var(--text-dim); }
.pinned-view .pv-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.6;
}
.pinned-view .pv-empty .icon { font-size: 32px; opacity: 0.4; margin-bottom: 12px; }
.pinned-view .pv-session-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.pinned-view .pv-session-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.pinned-view .pv-session-title {
  font-size: 14px;
  font-weight: 600;
  color: #4ade80;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pinned-view .pv-session-title.unset { color: var(--text-dim); font-style: italic; font-weight: 400; }
.pinned-view .pv-session-project {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pinned-view .pv-open-session-btn {
  background: var(--accent2);
  color: white;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
}
.pinned-view .pv-open-session-btn:hover { opacity: 0.85; }

.pinned-view .pv-chapter {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: rgba(245, 158, 11, 0.06);
  border-left: 3px solid #f59e0b;
  border-radius: 0 6px 6px 0;
  margin-top: 6px;
}
.pinned-view .pv-chapter-icon { color: #f59e0b; font-size: 12px; flex-shrink: 0; }
.pinned-view .pv-chapter-title {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pinned-view .pv-jump-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
}
.pinned-view .pv-jump-btn:hover { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border-color: #f59e0b; }
.pinned-view .pv-jump-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Highlight a message after jump-to-pin */
.message-wrapper.pin-flash .message-inner {
  outline: 2px solid #f59e0b;
  outline-offset: 6px;
  border-radius: 12px;
  animation: pinFlash 2.4s ease-out;
}
@keyframes pinFlash {
  0%   { outline-color: #f59e0b; box-shadow: 0 0 24px rgba(245, 158, 11, 0.65); }
  60%  { outline-color: #f59e0b; box-shadow: 0 0 12px rgba(245, 158, 11, 0.35); }
  100% { outline-color: transparent; box-shadow: none; }
}

/* Persistent pin anchor — stays after the jump flash fades, so the pin
   location is still findable when you switch into export mode. */
.message-wrapper.has-pin-anchor .message-inner {
  box-shadow: inset 3px 0 0 rgba(245, 158, 11, 0.7);
  border-radius: 12px;
}
.pin-anchor-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600; color: #f59e0b;
  background: rgba(245, 158, 11, 0.12);
  border: 1px solid rgba(245, 158, 11, 0.35);
  border-radius: 10px; padding: 1px 8px; margin-bottom: 6px;
}

/* Pin-page export button (sits next to 跳转) */
.pinned-view .pv-export-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  padding: 4px 10px; font-size: 11px; border-radius: 6px; cursor: pointer; white-space: nowrap;
}
.pinned-view .pv-export-btn:hover { background: rgba(34, 197, 94, 0.15); color: #22c55e; border-color: #22c55e; }
.pinned-view .pv-export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Scroll-to-top button */
.scroll-top-btn {
  position: absolute;
  bottom: 72px;
  right: 32px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.scroll-top-btn.show {
  opacity: 1;
  pointer-events: auto;
}

.scroll-top-btn:hover {
  background: var(--accent2);
  color: white;
  border-color: var(--accent2);
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:22px;height:22px">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Session Viewer
      <button class="pinned-btn" id="pinnedBtn" onclick="togglePinnedView()" title="查看所有 pin 过的对话">
        🔔 <span>Pinned</span><span class="pin-count" id="pinnedCount" style="display:none">0</span>
      </button>
      <button class="settings-btn" id="settingsBtn" onclick="toggleConfig()" title="配置路径">&#9881;</button>
    </div>
    <div class="config-panel" id="configPanel">
      <div class="config-label">Claude 数据目录 (~/.claude)</div>
      <div class="config-row">
        <input type="text" id="claudePathInput" placeholder="例如: /Users/xxx/.claude">
        <button class="config-btn" onclick="applyPath()">应用</button>
      </div>
      <div class="config-status" id="configStatus"></div>
    </div>
    <div class="search-box" style="position:relative">
      <input type="text" id="searchInput" placeholder="搜索 session（回车全文搜索）...">
      <div id="searchMode" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text-dim);pointer-events:none"></div>
    </div>
    <div class="filter-bar">
      <button class="filter-pill active" data-filter="all" onclick="setFilter('all')" title="全部对话（默认不含心跳，可点 🔍 心跳 单独查看）">全部</button>
      <button class="filter-pill" data-filter="manual" onclick="setFilter('manual')">我的对话</button>
      <button class="filter-pill" data-filter="scheduled" onclick="setFilter('scheduled')">定时任务</button>
      <button class="filter-pill" data-filter="headless" onclick="setFilter('headless')" title="无状态 SDK CLI 调用（破壁人 reader 等心跳任务），默认不在「全部」中显示">🔍 心跳</button>
      <button class="filter-pill" data-filter="archived" onclick="setFilter('archived')">已归档</button>
      <button class="filter-pill toggle-pill" id="hideUnnamedToggle" onclick="toggleHideUnnamed()" title="隐藏没有自定义标题的会话">仅命名</button>
      <button class="filter-pill toggle-pill" id="hideAbandonedToggle" onclick="toggleHideAbandoned()" title="隐藏被 fork 后 48 小时未再活动的原始会话">隐藏废弃</button>
    </div>
    <div class="sidebar-content" id="sidebarContent">
      <div class="loading">加载中</div>
    </div>
  </div>

  <div class="main">
    <div class="main-header" id="mainHeader" style="display:none">
      <span class="session-title" id="sessionTitle"></span>
      <span class="msg-count" id="msgCount"></span>
      <span style="flex:1"></span>
      <span class="pin-nav" id="pinNav" style="display:none">
        <button class="pin-nav-btn" id="pinPrevBtn" onclick="navPins(-1)" title="上一条收藏">◀</button>
        <span class="pin-nav-label" id="pinNavLabel">📌</span>
        <button class="pin-nav-btn" id="pinNextBtn" onclick="navPins(1)" title="下一条收藏">▶</button>
      </span>
      <button class="btn-small" id="toggleFindBtn" onclick="toggleFindBar()" title="页内搜索 (⌘F)">🔍 页内搜索</button>
      <button class="btn-small" id="toggleExportBtn" onclick="toggleExportMode()">导出模式</button>
    </div>
    <div class="find-bar" id="findBar">
      <input type="text" id="findInput" placeholder="在当前对话内搜索...">
      <span class="find-count" id="findCount">0 / 0</span>
      <button class="find-btn" id="findPrevBtn" onclick="findPrev()" title="上一个 (⇧↵)">↑</button>
      <button class="find-btn" id="findNextBtn" onclick="findNext()" title="下一个 (↵)">↓</button>
      <button class="find-btn" onclick="closeFindBar()" title="关闭 (Esc)">✕</button>
    </div>
    <div class="export-toolbar" id="exportToolbar">
      <button class="btn secondary" onclick="selectAllMessages()">全选</button>
      <button class="btn secondary" onclick="selectNoneMessages()">取消全选</button>
      <button class="btn secondary" onclick="selectConversationOnly()">仅对话</button>
      <button class="btn secondary" onclick="selectMyInputOnly()" title="只选你输入的消息，排除 Claude 回复、工具结果与 compact 压缩摘要">仅我的输入</button>
      <span class="selection-info" id="selectionInfo">已选 0 条</span>
      <button class="btn nav-btn" id="selPrevBtn" onclick="navSelected(-1)" title="上一条已选" disabled>◀</button>
      <button class="btn nav-btn" id="selNextBtn" onclick="navSelected(1)" title="下一条已选" disabled>▶</button>
      <button class="btn export-btn" onclick="exportHtml()">导出 HTML</button>
      <button class="btn secondary" onclick="copySelectedPlainText()">复制纯文本</button>
    </div>
    <div class="chat-container" id="chatContainer">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        选择一个 session 查看对话
      </div>
    </div>
    <div class="pinned-view" id="pinnedView">
      <div class="pv-header">
        <span class="pv-title">🔔 已收藏的回复</span>
        <span class="pv-subtitle" id="pinnedSubtitle"></span>
        <span style="flex:1"></span>
        <button class="btn-small" onclick="hidePinnedView()">关闭</button>
      </div>
      <div id="pinnedListBody"></div>
    </div>
    <button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()" title="回到顶部">↑</button>
    <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom()" title="跳到最新">↓</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (sel) => document.querySelector(sel);
const $$ = (sel, parent) => (parent || document).querySelectorAll(sel);

let allSessions = {};
let currentMessages = []; // store parsed messages for export
let exportMode = false;
let allPins = [];             // list of pinned sessions returned by /api/pins
let pinnedSessionPaths = new Set(); // sessionPath strings that have ≥1 pin (for sidebar badge)
let pendingJumpUuid = null;   // when set, loadSession will scroll+flash this uuid after render
let pendingExport = null;     // {uuid} → after the session loads, enter export mode + preselect pins
let currentSessionPath = '';  // path of the session currently rendered (for pin-anchor lookup)
let selNavIndex = -1;         // cursor for the ◀ ▶ review-selected navigator
let pinNavIndex = -1;         // cursor for the header 📌 pin navigator

// ── Toast ──
function showToast(text) {
  const t = $('#toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Copy helpers ──
async function copyText(text, btnEl) {
  await navigator.clipboard.writeText(text);
  if (btnEl) {
    const orig = btnEl.textContent;
    btnEl.textContent = '已复制';
    btnEl.classList.add('copied');
    setTimeout(() => { btnEl.textContent = orig; btnEl.classList.remove('copied'); }, 1500);
  }
}

function copyMessageText(idx, btnEl) {
  const group = currentRenderedGroups[idx];
  if (!group) return;
  const plainText = groupToPlainText(group);
  copyText(plainText, btnEl);
}

// ── Export mode ──
function toggleExportMode(preselectUuids) {
  exportMode = !exportMode;
  const chat = $('#chatContainer');
  const btn = $('#toggleExportBtn');
  const toolbar = $('#exportToolbar');

  if (exportMode) {
    chat.classList.add('export-mode');
    btn.textContent = '退出导出';
    btn.classList.add('copied');
    toolbar.classList.add('show');
    // If this session has pins, pre-select them and bring the first into view —
    // so the pinned reply is never lost when entering export mode. When opened via
    // a single pin's 导出 button, preselectUuids restricts this to just that pin.
    const firstPin = preselectPinnedForExport(preselectUuids);
    if (firstPin) firstPin.scrollIntoView({ block: 'center' });
  } else {
    chat.classList.remove('export-mode');
    btn.textContent = '导出模式';
    btn.classList.remove('copied');
    toolbar.classList.remove('show');
  }
  updateSelectionInfo();
}

// Collect the message uuids pinned in the currently-loaded session.
function pinUuidsForCurrentSession() {
  const set = new Set();
  for (const p of allPins) {
    if (p.sessionPath !== currentSessionPath) continue;
    for (const c of (p.chapters || [])) if (c.msgUuid) set.add(c.msgUuid);
  }
  return set;
}

// Mark pinned messages with a persistent 📌 anchor after a session renders.
function markPinAnchorsForCurrentSession() {
  const uuids = pinUuidsForCurrentSession();
  if (!uuids.size) return;
  $$('.message-wrapper').forEach(w => {
    const wu = (w.dataset.uuids || '').split(' ');
    if (!wu.some(u => uuids.has(u))) return;
    if (w.classList.contains('has-pin-anchor')) return;
    w.classList.add('has-pin-anchor');
    const inner = w.querySelector('.message-inner');
    if (inner && !inner.querySelector('.pin-anchor-badge')) {
      const badge = document.createElement('div');
      badge.className = 'pin-anchor-badge';
      badge.textContent = '📌 已收藏';
      inner.insertBefore(badge, inner.firstChild);
    }
  });
}

// Show/refresh the header pin navigator for the current session.
function setupPinNav() {
  pinNavIndex = -1;
  const nav = $('#pinNav'), label = $('#pinNavLabel');
  if (!nav) return;
  const count = document.querySelectorAll('.message-wrapper.has-pin-anchor').length;
  if (!count) { nav.style.display = 'none'; return; }
  nav.style.display = 'inline-flex';
  if (label) label.textContent = `📌 ${count} 条`;
}

// Jump to the previous/next pinned message in this session — works any time,
// not just in export mode, so you can hop between 📌 anchors while reading.
function navPins(dir) {
  const wrappers = Array.from(document.querySelectorAll('.message-wrapper.has-pin-anchor'));
  if (!wrappers.length) return;
  pinNavIndex = (pinNavIndex + dir + wrappers.length) % wrappers.length;
  flashWrapper(wrappers[pinNavIndex]);
  const label = $('#pinNavLabel');
  if (label) label.textContent = `📌 ${pinNavIndex + 1}/${wrappers.length}`;
}

// Check + highlight pinned messages for export; returns the first matched wrapper.
function preselectPinnedForExport(onlyUuids) {
  let uuids = pinUuidsForCurrentSession();
  // When a single pin's 导出 button was used, restrict the pre-selection to it —
  // don't silently check the session's other (off-screen) pins.
  if (onlyUuids) uuids = new Set([...uuids].filter(u => onlyUuids.has(u)));
  if (!uuids.size) return null;
  let first = null;
  $$('.message-wrapper').forEach(w => {
    const wu = (w.dataset.uuids || '').split(' ');
    if (!wu.some(u => uuids.has(u))) return;
    const cb = w.querySelector('.msg-checkbox');
    if (cb) cb.checked = true;
    w.classList.add('selected-for-export');
    if (!first) first = w;
  });
  updateSelectionInfo();
  return first;
}

function selectAllMessages() {
  $$('.msg-checkbox').forEach(cb => { cb.checked = true; });
  $$('.message-wrapper').forEach(el => el.classList.add('selected-for-export'));
  updateSelectionInfo();
}

function selectNoneMessages() {
  $$('.msg-checkbox').forEach(cb => { cb.checked = false; });
  $$('.message-wrapper').forEach(el => el.classList.remove('selected-for-export'));
  updateSelectionInfo();
}

function selectConversationOnly() {
  $$('.msg-checkbox').forEach(cb => {
    const idx = parseInt(cb.dataset.groupIdx);
    const group = currentRenderedGroups[idx];
    if (!group) { cb.checked = false; return; }
    // Skip compact-summary blocks — they're Claude Code's compaction artifact,
    // not part of the real conversation.
    const hasConversation = !group.isCompactSummary &&
      (group.role === 'user' || (group.role === 'assistant' && group.parts.some(p => p.type === 'text' && p.text.trim())));
    cb.checked = hasConversation;
    const wrapper = cb.closest('.message-wrapper');
    if (wrapper) wrapper.classList.toggle('selected-for-export', hasConversation);
  });
  updateSelectionInfo();
}

// Select only the messages you actually typed — excludes Claude's replies, tool
// results, system markers, and the compact summary Claude Code injects after a
// /compact (stored as a role:user message, but generated rather than typed).
function selectMyInputOnly() {
  $$('.msg-checkbox').forEach(cb => {
    const idx = parseInt(cb.dataset.groupIdx);
    const group = currentRenderedGroups[idx];
    const isMyInput = !!group && group.role === 'user' && !group.isCompactSummary;
    cb.checked = isMyInput;
    const wrapper = cb.closest('.message-wrapper');
    if (wrapper) wrapper.classList.toggle('selected-for-export', isMyInput);
  });
  updateSelectionInfo();
}

function onCheckboxChange(cb) {
  const wrapper = cb.closest('.message-wrapper');
  if (wrapper) wrapper.classList.toggle('selected-for-export', cb.checked);
  updateSelectionInfo();
}

function updateSelectionInfo() {
  const checked = $$('.msg-checkbox:checked').length;
  const info = $('#selectionInfo');
  if (info) info.textContent = `已选 ${checked} 条`;
  // Selection changed → reset the review cursor and refresh the ◀ ▶ nav buttons.
  selNavIndex = -1;
  const prev = $('#selPrevBtn'), next = $('#selNextBtn');
  if (prev) prev.disabled = checked === 0;
  if (next) next.disabled = checked === 0;
}

// Step through the currently-selected messages so you can review exactly what will
// be exported before downloading — in a long session they're otherwise invisible.
function navSelected(dir) {
  const wrappers = Array.from($$('.msg-checkbox:checked'))
    .map(cb => cb.closest('.message-wrapper'))
    .filter(Boolean); // querySelectorAll preserves document order
  if (!wrappers.length) return;
  selNavIndex = (selNavIndex + dir + wrappers.length) % wrappers.length;
  flashWrapper(wrappers[selNavIndex]);
  const info = $('#selectionInfo');
  if (info) info.textContent = `已选 ${wrappers.length} 条 · 第 ${selNavIndex + 1}/${wrappers.length}`;
}

// ── Export ──
function getSelectedGroups() {
  const checked = $$('.msg-checkbox:checked');
  if (checked.length === 0) { showToast('请先选择要导出的消息'); return null; }
  const groups = [];
  checked.forEach(cb => {
    const idx = parseInt(cb.dataset.groupIdx);
    const group = currentRenderedGroups[idx];
    if (group) groups.push(group);
  });
  return groups;
}

function groupToPlainText(group) {
  if (group.role === 'user') return `[You]\n${group.text}`;
  if (group.role === 'assistant') {
    let text = '[Claude]\n';
    for (const part of group.parts) {
      if (part.type === 'text' && part.text.trim()) text += part.text.trim() + '\n';
      else if (part.type === 'tool_use') {
        const summary = summarizeToolInput(part.name, part.input);
        text += `[${part.name}${summary ? ': ' + summary : ''}]\n`;
      }
    }
    return text;
  }
  return '';
}

function groupToHtmlBlock(group, idx) {
  const copyBtn = `<button class="copy-btn" onclick="copyBlock(this)">复制</button>`;
  if (group.role === 'user') {
    return `<div class="msg user-msg" data-plain="${escapeAttr(group.text)}"><div class="role">You ${copyBtn}</div><div class="bubble user-bubble">${escapeHtml(group.text)}</div></div>`;
  }
  if (group.role === 'assistant') {
    let inner = '';
    let plainParts = [];
    for (const part of group.parts) {
      if (part.type === 'text' && part.text.trim()) {
        inner += `<div class="bubble assistant-bubble markdown-body">${renderMarkdownForExport(part.text)}</div>`;
        plainParts.push(part.text.trim());
      } else if (part.type === 'tool_use') {
        const summary = summarizeToolInput(part.name, part.input);
        inner += `<div class="tool-step"><span class="tool-badge">${escapeHtml(part.name)}</span>${summary ? ' <span class="tool-summary">' + escapeHtml(summary) + '</span>' : ''}</div>`;
        plainParts.push(`[${part.name}${summary ? ': ' + summary : ''}]`);
      }
    }
    if (!inner) return '';
    return `<div class="msg assistant-msg" data-plain="${escapeAttr(plainParts.join('\n'))}"><div class="role">Claude ${copyBtn}</div>${inner}</div>`;
  }
  if (group.role === 'system') {
    const text = (group.text || '').substring(0, 500);
    return `<div class="msg system-msg" data-plain="${escapeAttr(text)}"><div class="role">System ${copyBtn}</div><div class="bubble system-bubble">${escapeHtml(text)}</div></div>`;
  }
  return '';
}

function escapeAttr(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderMarkdownForExport(text) {
  // Export and the in-app view share one renderer so they stay consistent.
  return renderMarkdown(text);
}
